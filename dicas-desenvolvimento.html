<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicas & Desenvolvimento - Concursos Maranhão</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --accent: #10b981; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; position: relative; }

        .btn-voltar {
            text-decoration: none;
            color: #3b82f6;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-sub);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-link:hover { background: var(--card-bg); color: var(--text-main); }
        .nav-link.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); }

        header { text-align: center; margin: 40px 0; }
        header h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; }
        header p { color: var(--text-sub); max-width: 600px; margin: 0 auto; }

        .filtros-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-filtro {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-filtro.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .artigos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .artigo-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .artigo-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .capa { width: 100%; height: 180px; object-fit: cover; background: #111; }
        .conteudo { padding: 20px; flex-grow: 1; }
        .tag { 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: var(--accent); 
            display: block;
            margin-bottom: 10px;
        }
        .conteudo h2 { font-size: 1.25rem; margin: 0 0 10px 0; color: #fff; }
        .conteudo p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.5; }

        .btn-post {
            background: #10b981; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-menu">
        <div style="flex-grow: 1; display: flex; gap: 10px;">
            <a href="index.html" class="nav-link">🏠 Início</a>
            <a href="simulados.html" class="nav-link">📝 Simulados</a>
            <a href="blog.html" class="nav-link">📰 Notícias</a>
            <a href="#" class="nav-link active">💡 Dicas</a>
        </div>
        <a href="admin.html" class="btn-post" id="btnAdmin" style="display: none;">+ Novo Artigo</a>
    </nav>
        
    <a href="index.html" class="btn-voltar">← Voltar</a>

    <header>
        <h1>Dicas & Desenvolvimento</h1>
        <p>Técnicas de estudo e tecnologia para acelerar sua aprovação.</p>
    </header>

    <div class="filtros-container">
        <button class="btn-filtro active" onclick="filtrar('todos')">📚 Ver Tudo</button>
        <button class="btn-filtro" onclick="filtrar('dicas')">🧠 Dicas</button>
        <button class="btn-filtro" onclick="filtrar('dev')">💻 Dev</button>
        <button class="btn-filtro" onclick="filtrar('uema')">🏹 UEMA</button>
    </div>

    <div id="lista-artigos" class="artigos-grid">
        <p style="grid-column: 1/-1; text-align: center;">Carregando conhecimento...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Configurações de Conexão (Mesmas do seu Index/Blog)
    const supabaseUrl = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let todosArtigos = [];

    async function carregarArtigos() {
        const grid = document.getElementById('lista-artigos');
        try {
            // Buscando da tabela 'artigos' conforme sua imagem do Supabase
            const { data, error } = await _supabase
                .from('artigos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            todosArtigos = data || [];
            exibirArtigos(todosArtigos);
            
        } catch (error) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #ef4444;'>Erro ao carregar os artigos.</p>";
            console.error(error);
        }
    }

    function exibirArtigos(lista) {
        const grid = document.getElementById('lista-artigos');
        if (lista.length === 0) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Ainda estamos preparando este conteúdo.</p>";
            return;
        }

        grid.innerHTML = lista.map(artigo => `
            <a href="post.html?id=${artigo.id}" class="artigo-card">
                <img src="${artigo.capa_url || 'https://via.placeholder.com/400x200'}" 
                     class="capa" 
                     alt="${artigo.titulo}"
                     onerror="this.src='https://via.placeholder.com/400x200'">
                <div class="conteudo">
                    <span class="tag">${artigo.categoria || 'Geral'}</span>
                    <h2>${artigo.titulo}</h2>
                    <p>${artigo.resumo || ''}</p>
                </div>
            </a>
        `).join('');
    }

    function filtrar(cat) {
        // Estilo dos botões
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
        if (event) event.target.classList.add('active');

        if (cat === 'todos') {
            exibirArtigos(todosArtigos);
        } else {
            const filtrados = todosArtigos.filter(a => 
                a.categoria && a.categoria.toLowerCase() === cat.toLowerCase()
            );
            exibirArtigos(filtrados);
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        // Controle de Admin
        const isAdmin = localStorage.getItem('token_admin'); 
        if (isAdmin === 'sou_o_dono_do_site') {
            document.getElementById('btnAdmin').style.display = 'block';
        }
        carregarArtigos();
    });
</script>

</body>
</html>
