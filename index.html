<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concursos Maranhão Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Mantendo exatamente o seu estilo das imagens */
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { margin: 0; background-color: #0f172a; color: white; overflow-x: hidden; }
        header { padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
        #grid-concursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .concurso-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .concurso-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn-filter { padding: 8px 15px; border-radius: 20px; border: 1px solid #3b82f6; background: transparent; color: #3b82f6; cursor: pointer; text-decoration: none; font-size: 0.8rem; margin: 2px; display: inline-flex; align-items: center; }
        input#inputBusca { width: 100%; max-width: 600px; padding: 12px; border-radius: 8px; border: none; margin-bottom: 15px; outline: none; }
        .badge { background: #3b82f6; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>

<body>
    
    <header>
        <h1>Concursos Maranhão Pro</h1>
        <div id="stats-counter">Conectando ao banco...</div>
        <div style="margin-top: 20px;">
            <input type="text" id="inputBusca" placeholder="Ex: Professor, São Luís, UFMA...">
            <div style="margin-top: 10px;">
                <a href="blog.html" class="btn-filter">📰 Blog</a>
                <a href="blog.html?cat=UEMA" class="btn-filter">🏹 UEMA</a>
                <a href="blog.html?cat=ENEM" class="btn-filter">🎓 ENEM</a>
            </div>
        </div>
    </header>

    <section style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="stat-card"><span>💰 Média Salarial</span><h3 id="media-salarial">---</h3></div>
            <div class="stat-card"><span>🏢 Maior Salário</span><h3 id="maior-salario">---</h3></div>
        </div>
    </section>

    <main id="grid-concursos"></main>

    <script>
        // VERIFIQUE SE ESTES DADOS SÃO EXATAMENTE OS DO SEU PAINEL DO SUPABASE
        const URL_SB = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
        const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
        const _supabase = supabase.createClient(URL_SB, KEY_SB);

        let concursosLocais = [];

        async function buscarDados() {
            try {
                // Tenta buscar da tabela 'concursos'
                const { data, error } = await _supabase
                    .from('concursos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                concursosLocais = data;
                renderizarCards(data);
                atualizarStats(data);
                document.getElementById('stats-counter').innerText = `${data.length} editais encontrados`;

            } catch (err) {
                console.error("Erro Supabase:", err);
                document.getElementById('grid-concursos').innerHTML = `<p style="text-align:center; grid-column: 1/-1;">Erro ao carregar: ${err.message}</p>`;
            }
        }

        function renderizarCards(lista) {
            const grid = document.getElementById('grid-concursos');
            grid.innerHTML = lista.map(c => `
                <div class="concurso-card">
                    <span class="badge">${c.cidade || 'MA'}</span>
                    <h2 style="font-size: 1.1rem; color: #60a5fa; margin: 10px 0;">${c.orgao}</h2>
                    <p style="font-size: 0.85rem; color: #94a3b8;">Banca: ${c.banca || 'A definir'}</p>
                    <p style="font-weight: bold; color: #10b981;">${c.salario_max ? 'Até R$ ' + c.salario_max : 'Consulte o edital'}</p>
                    <a href="detalhes.html?id=${c.id}&tipo=concurso" style="display: block; text-align: center; background: #3b82f6; color: white; text-decoration: none; padding: 10px; border-radius: 6px; margin-top: 15px; font-weight: bold; font-size: 0.8rem;">VER DETALHES</a>
                </div>
            `).join('');
        }

        function atualizarStats(data) {
            const salarios = data.map(c => parseFloat(c.salario_max)).filter(s => s > 0);
            if (salarios.length > 0) {
                const media = salarios.reduce((a, b) => a + b, 0) / salarios.length;
                const maior = Math.max(...salarios);
                document.getElementById('media-salarial').innerText = media.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                document.getElementById('maior-salario').innerText = maior.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }
        }

        document.getElementById('inputBusca').addEventListener('input', (e) => {
            const busca = e.target.value.toLowerCase();
            const filtrados = concursosLocais.filter(c => c.orgao.toLowerCase().includes(busca) || c.cidade.toLowerCase().includes(busca));
            renderizarCards(filtrados);
        });

        buscarDados();
    </script>
</body>
</html>
