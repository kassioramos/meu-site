<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando... - Concursos Maranhão Pro</title>
    <style>
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --border: rgba(255,255,255,0.1); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.5;
            padding: 20px;
        }

        .container-detalhes { max-width: 850px; margin: 20px auto; }
        .btn-voltar { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .btn-voltar:hover { transform: translateX(-5px); }
        
        .detalhes-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 30px; 
            border-top: 5px solid var(--primary); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .header-content h1 { color: var(--primary); margin: 10px 0; font-size: 2rem; line-height: 1.2; }
        
        /* Grid para Concursos */
        .grid-info { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin: 25px 0; 
        }

        .info-item { 
            background: rgba(59, 130, 246, 0.05); 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            text-align: center; 
        }

        .info-item label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 5px; font-weight: 700; }
        .info-item span { font-size: 1rem; font-weight: 700; color: var(--text-main); }

        /* Conteúdo do Artigo/Blog */
        .artigo-corpo { font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; }
        .artigo-corpo h2, .artigo-corpo h3 { color: var(--primary); margin: 25px 0 15px 0; }
        .artigo-corpo p { margin-bottom: 20px; }
        .capa-artigo { width: 100%; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }

        .sobre-secao { 
            background: rgba(0,0,0,0.2); 
            padding: 25px; 
            border-radius: 12px; 
            border-left: 4px solid var(--primary);
            margin: 20px 0;
        }

        .table-container { width: 100%; overflow-x: auto; margin: 15px 0; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: rgba(59, 130, 246, 0.15); color: var(--primary); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        .btn-acao { 
            display: block; 
            width: 100%; 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            margin-top: 15px; 
            transition: 0.3s;
        }
        .btn-inscricao { background: #10b981; }
        .btn-questoes { background: #8b5cf6; }
        .btn-acao:hover { opacity: 0.9; transform: translateY(-2px); }

        .status-tag { background: #10b981; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        @media (max-width: 600px) {
            .detalhes-card { padding: 20px; }
            .header-content h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container-detalhes">
    <a href="#" class="btn-voltar" onclick="window.history.back(); return false;">← Voltar</a>
    <div id="conteudo-dinamico" class="detalhes-card">
        <p style="text-align: center;">Buscando informações...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const URL_SB = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _supabase = supabase.createClient(URL_SB, KEY_SB);

    const fmtMoeda = (v) => v ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v) : 'Consultar Edital';
    const fmtData = (d) => (d && d !== 'null') ? new Date(d).toLocaleDateString('pt-BR', {timeZone: 'UTC'}) : 'A definir';

    async function carregarPagina() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');       // Para Concursos
        const slug = params.get('slug');   // Para Artigos/Blog
        const container = document.getElementById('conteudo-dinamico');

        try {
            if (id) {
                // MODO CONCURSO
                const { data: c, error } = await _supabase.from('concursos').select('*').eq('id', id).single();
                if (error || !c) throw new Error();

                document.title = `${c.orgao} - Concursos MA Pro`;
                
                container.innerHTML = `
                    <div class="header-content">
                        <span class="status-tag">${c.status || 'Aberto'}</span>
                        <h1>${c.orgao}</h1>
                    </div>
                    <div class="grid-info">
                        <div class="info-item"><label>📍 Local</label><span>${c.cidade || 'Maranhão'}</span></div>
                        <div class="info-item"><label>🏢 Banca</label><span>${c.banca || 'A definir'}</span></div>
                        <div class="info-item"><label>💰 Salário</label><span>${fmtMoeda(c.salario_max)}</span></div>
                        <div class="info-item"><label>📅 Prova</label><span>${fmtData(c.data_prova)}</span></div>
                    </div>
                    <div class="sobre-secao">
                        <h3 style="color:var(--primary); margin-top:0;">Informações do Certame</h3>
                        <div class="table-container">${c.tabela_vagas || `<p>${c.cargos || 'Ver edital'}</p>`}</div>
                        <p style="margin-top:20px; color:var(--text-sub);">${c.descricao_seo || ''}</p>
                    </div>
                    <a href="questoes.html?banca=${encodeURIComponent(c.banca || '')}" class="btn-acao btn-questoes">✍️ Treinar Questões da ${c.banca || 'Banca'}</a>
                    ${c.link_oficial ? `<a href="${c.link_oficial}" target="_blank" class="btn-acao">📄 Ver Edital Oficial</a>` : ''}
                    ${c.link_inscricao ? `<a href="${c.link_inscricao}" target="_blank" class="btn-acao btn-inscricao">📝 Fazer Inscrição</a>` : ''}
                `;

            } else if (slug) {
                // MODO ARTIGO / BLOG
                const { data: a, error } = await _supabase.from('artigos').select('*').eq('slug', slug).single();
                if (error || !a) throw new Error();

                document.title = `${a.titulo} - Blog MA Pro`;

                container.innerHTML = `
                    <div class="header-content">
                        <span class="status-tag" style="background:var(--primary)">${a.categoria}</span>
                        <h1 style="margin-bottom:25px;">${a.titulo}</h1>
                        ${a.capa_url ? `<img src="${a.capa_url}" class="capa-artigo" alt="Capa">` : ''}
                    </div>
                    <div class="artigo-corpo">
                        ${a.conteudo}
                    </div>
                    <p style="margin-top:40px; font-size:0.8rem; color:var(--text-sub)">Publicado em: ${fmtData(a.created_at)}</p>
                `;
            } else {
                container.innerHTML = "❌ Conteúdo não encontrado.";
            }

        } catch (e) {
            container.innerHTML = "❌ Erro ao carregar os dados. Tente novamente.";
        }
    }

    window.onload = carregarPagina;
</script>
</body>
</html>
