<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando... - Concursos Maranhão Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --border: rgba(255,255,255,0.1); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.5;
            padding: 20px;
        }

        .container-detalhes { max-width: 850px; margin: 20px auto; }
        
        .btn-voltar { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        .btn-voltar:hover { transform: translateX(-5px); }
        
        .detalhes-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 30px; 
            border-top: 5px solid var(--primary); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .header-content h1 { color: var(--primary); margin: 10px 0; font-size: 2rem; line-height: 1.2; }
        
        .grid-info { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin: 25px 0; 
        }

        .info-item { 
            background: rgba(59, 130, 246, 0.05); 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            text-align: center; 
        }

        .info-item label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 5px; font-weight: 700; }
        .info-item span { font-size: 1rem; font-weight: 700; color: var(--text-main); }

        .artigo-corpo { font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; }
        .artigo-corpo h2, .artigo-corpo h3 { color: var(--primary); margin: 25px 0 15px 0; }
        .capa-artigo { width: 100%; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }

        .sobre-secao { 
            background: rgba(0,0,0,0.2); 
            padding: 25px; 
            border-radius: 12px; 
            border-left: 4px solid var(--primary);
            margin: 20px 0;
        }

        .btn-acao { 
            display: block; 
            width: 100%; 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            margin-top: 15px; 
            transition: 0.3s;
        }
        .btn-inscricao { background: #10b981; }
        .btn-questoes { background: #8b5cf6; }
.btn-acao { 
            display: block; 
            width: 100%; 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            margin-top: 15px; 
            /* ADICIONE/AJUSTE ESTA LINHA ABAIXO */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-acao:hover {
            opacity: 0.9;
            filter: brightness(1.2);
            /* Aumentado para -5px para o efeito ser perceptível */
            transform: translateY(-5px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }
        .status-tag { background: #10b981; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        @media (max-width: 600px) {
            .detalhes-card { padding: 20px; }
            .header-content h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container-detalhes">
    <a href="#" class="btn-voltar" onclick="window.history.back(); return false;">← Voltar</a>
    <div id="conteudo-dinamico" class="detalhes-card">
        <p style="text-align: center;">Buscando informações...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const URL_SB = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const KEY_SB = 'sb_publishable_VTkTKTGqA7QtDR3cnENUwQ_mGDWVkle';
    const _supabase = supabase.createClient(URL_SB, KEY_SB);

    const fmtMoeda = (v) => v ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v) : 'Consultar Edital';
    const fmtData = (d) => (d && d !== 'null') ? new Date(d).toLocaleDateString('pt-BR', {timeZone: 'UTC'}) : 'A definir';

    async function carregarConteudo() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const slug = urlParams.get('slug');
        const tipo = urlParams.get('tipo');

        const container = document.getElementById('conteudo-dinamico');

        try {
            let dados;
            let erroBusca;

            if (tipo === 'concurso' && id) {
                const { data, error } = await _supabase.from('concursos').select('*').eq('id', id).single();
                dados = data;
                erroBusca = error;
            } else if (tipo === 'artigo' && slug) {
                const { data, error } = await _supabase.from('artigos').select('*').eq('slug', slug).single();
                dados = data;
                erroBusca = error;
            } else if (tipo === 'questao' && id) {
                const { data, error } = await _supabase.from('questoes').select('*').eq('id', id).single();
                dados = data;
                erroBusca = error;
            }

            if (erroBusca || !dados) {
                container.innerHTML = "<h2 style='text-align:center'>❌ Conteúdo não encontrado.</h2><p style='text-align:center'>Verifique o link ou retorne à página inicial.</p>";
                return;
            }

            if (tipo === 'concurso') {
                renderizarConcurso(dados);
            } else if (tipo === 'artigo') {
                renderizarArtigo(dados);
            } else if (tipo === 'questao') {
                renderizarQuestao(dados);
            }

        } catch (err) {
            console.error("Erro:", err);
            container.innerHTML = "<h2>Erro ao carregar os dados.</h2>";
        }
    }

function renderizarConcurso(c) {
    const container = document.getElementById('conteudo-dinamico');
    document.title = `${c.orgao} - Concursos MA Pro`;

    const linkQuestoesBanca = c.banca ? `questoes.html?banca=${encodeURIComponent(c.banca)}` : '#';

    container.innerHTML = `
        <div class="header-content">
            <span class="status-tag">${c.status || 'Aberto'}</span>
            <h1>${c.orgao}</h1>
            <p>📍 ${c.cidade || 'Maranhão'} | 🏢 Banca: ${c.banca || 'A definir'}</p>
        </div>

        <div class="grid-info">
            <div class="info-item">
                <label>Inscrições até</label>
                <span>${fmtData(c.data_fim)}</span>
            </div>
            <div class="info-item">
                <label>Salário até</label>
                <span>${fmtMoeda(c.salario)}</span>
            </div>
            <div class="info-item">
                <label>Vagas</label>
                <span>${c.vagas || 'Ver edital'}</span>
            </div>
        </div>

        <div class="sobre-secao">
            <h3>📋 Sobre o Certame</h3>
            <p>${c.descricao || 'Confira os detalhes completos no edital oficial abaixo.'}</p>
        </div>

        <div class="acoes-container" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
            ${(c.link_oficial || c.link_edital) ? `
    <a href="${c.link_oficial || c.link_edital}" target="_blank" class="btn-acao" style="background: #475569;">
        📄 LER EDITAL OFICIAL
            </a>
    ` : ''}


            ${c.banca ? `
                <a href="${linkQuestoesBanca}" class="btn-acao btn-questoes">
                    📝 QUESTÕES DA BANCA ${c.banca.toUpperCase()}
                </a>
            ` : ''}

            ${c.link_inscricao ? `
                <a href="${c.link_inscricao}" target="_blank" class="btn-acao btn-inscricao">
                    🚀 FAZER INSCRIÇÃO
                </a>
            ` : ''}
        </div>
    `;
}


    function renderizarQuestao(q) {
        const container = document.getElementById('conteudo-dinamico');
        document.title = `Questão - ${q.disciplina}`;

        let opcoesHtml = '';

        if (q.opcoes) {
            const opcoes = typeof q.opcoes === 'string' ? JSON.parse(q.opcoes) : q.opcoes;

            for (const letra in opcoes) {
                opcoesHtml += `
        <button 
            class="opcao-btn"
            data-letra="${letra}"
            onclick="mostrarResposta('${letra}','${q.alternativa_correta}', \`${q.comentario_professor || ''}\`)"
            style="display:block;width:100%;margin:10px 0;padding:12px;border:none;border-radius:8px;background:#334155;color:white;cursor:pointer;">
            ${letra.toUpperCase()}) ${opcoes[letra]}
        </button>
                `;
            }
        }

        container.innerHTML = `
            <div class="header-content">
                <span class="status-tag">${q.banca}</span>
                <h1>${q.disciplina}</h1>
            </div>

            <div class="sobre-secao">
                <h3>📘 Enunciado</h3>
                <p>${q.enunciado}</p>
            </div>

            <div class="sobre-secao">
                <h3>📝 Alternativas</h3>
                ${opcoesHtml}
            </div>

            <div id="resultado"></div>
        `;
    }

function mostrarResposta(marcada, correta, comentario) {
    const resultado = document.getElementById('resultado');
    const botoes = document.querySelectorAll('.opcao-btn');

    // limpa estilos anteriores
    botoes.forEach(btn => {
        btn.style.background = '#334155';
        btn.style.border = 'none';
    });

    // pinta os botões
    botoes.forEach(btn => {
        const letraBtn = btn.getAttribute('data-letra');

        if (letraBtn === correta) {
            btn.style.background = '#16a34a'; // verde
            btn.style.border = '2px solid #22c55e';
        }

        if (letraBtn === marcada && marcada !== correta) {
            btn.style.background = '#dc2626'; // vermelho
            btn.style.border = '2px solid #ef4444';
        }
    });

    // mostra comentário
    if (marcada === correta) {
        resultado.innerHTML = `
            <div class="sobre-secao" style="border-left:4px solid #10b981;">
                <h3>✅ Resposta correta!</h3>
                <p style="margin-top:10px;">${comentario}</p>
            </div>
        `;
    } else {
        resultado.innerHTML = `
            <div class="sobre-secao" style="border-left:4px solid #ef4444;">
                <h3>❌ Resposta errada!</h3>
                <p><strong>Resposta correta:</strong> ${correta.toUpperCase()}</p>
                <p style="margin-top:10px;">${comentario}</p>
            </div>
        `;
    }
}

    document.addEventListener('DOMContentLoaded', carregarConteudo);
</script>
</body>
</html>
