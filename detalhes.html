<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando... - Concursos Maranhão Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --border: rgba(255,255,255,0.1); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.5;
            padding: 20px;
        }

        .container-detalhes { max-width: 850px; margin: 20px auto; }
        
        .btn-voltar { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        .btn-voltar:hover { transform: translateX(-5px); }
        
        .detalhes-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 30px; 
            border-top: 5px solid var(--primary); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .header-content h1 { color: var(--primary); margin: 10px 0; font-size: 2rem; line-height: 1.2; }
        
        .grid-info { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin: 25px 0; 
        }

        .info-item { 
            background: rgba(59, 130, 246, 0.05); 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            text-align: center; 
        }

        .info-item label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 5px; font-weight: 700; }
        .info-item span { font-size: 1rem; font-weight: 700; color: var(--text-main); }

        .artigo-corpo { font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; }
        .artigo-corpo h2, .artigo-corpo h3 { color: var(--primary); margin: 25px 0 15px 0; }
        .capa-artigo { width: 100%; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }

        .sobre-secao { 
            background: rgba(0,0,0,0.2); 
            padding: 25px; 
            border-radius: 12px; 
            border-left: 4px solid var(--primary);
            margin: 20px 0;
        }

        .btn-acao { 
            display: block; 
            width: 100%; 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            margin-top: 15px; 
            transition: 0.3s;
        }
        .btn-inscricao { background: #10b981; }
        .btn-questoes { background: #8b5cf6; }
        .btn-acao:hover { opacity: 0.9; transform: translateY(-2px); }

        .status-tag { background: #10b981; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        @media (max-width: 600px) {
            .detalhes-card { padding: 20px; }
            .header-content h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container-detalhes">
    <a href="#" class="btn-voltar" onclick="window.history.back(); return false;">← Voltar</a>
    <div id="conteudo-dinamico" class="detalhes-card">
        <p style="text-align: center;">Buscando informações...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const URL_SB = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _supabase = supabase.createClient(URL_SB, KEY_SB);

    const fmtMoeda = (v) => v ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v) : 'Consultar Edital';
    const fmtData = (d) => (d && d !== 'null') ? new Date(d).toLocaleDateString('pt-BR', {timeZone: 'UTC'}) : 'A definir';

    async function carregarConteudo() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const slug = urlParams.get('slug');
        const tipo = urlParams.get('tipo');

        const container = document.getElementById('conteudo-dinamico');

        try {
            let dados;
            let erroBusca;

            if (tipo === 'concurso' && id) {
                const { data, error } = await _supabase.from('concursos').select('*').eq('id', id).single();
                dados = data;
                erroBusca = error;
            } else if (tipo === 'artigo' && slug) {
                const { data, error } = await _supabase.from('artigos').select('*').eq('slug', slug).single();
                dados = data;
                erroBusca = error;
            }

            if (erroBusca || !dados) {
                container.innerHTML = "<h2 style='text-align:center'>❌ Conteúdo não encontrado.</h2><p style='text-align:center'>Verifique o link ou retorne à página inicial.</p>";
                return;
            }

            if (tipo === 'concurso') {
                renderizarConcurso(dados);
            } else {
                renderizarArtigo(dados);
            }

        } catch (err) {
            console.error("Erro:", err);
            container.innerHTML = "<h2>Erro ao carregar os dados.</h2>";
        }
    }

    function renderizarConcurso(c) {
        const container = document.getElementById('conteudo-dinamico');
        document.title = `${c.orgao} - Concursos MA Pro`;

        container.innerHTML = `
            <div class="header-content">
                <span class="status-tag">${c.status || 'Aberto'}</span>
                <h1>${c.orgao}</h1>
                <p>📍 ${c.cidade || 'Maranhão'} | 🏢 Banca: ${c.banca || 'A definir'}</p>
            </div>

            <div class="grid-info">
                <div class="info-item"><label>💰 Salário até</label><span>${fmtMoeda(c.salario_max)}</span></div>
                <div class="info-item"><label>🎓 Vagas</label><span>${c.vagas || 'Ver edital'}</span></div>
                <div class="info-item"><label>📅 Inscrições até</label><span>${fmtData(c.data_fim)}</span></div>
            </div>

            <div class="sobre-secao">
                <h3>📝 Sobre o Concurso</h3>
                <p>${c.resumo || 'Informações detalhadas disponíveis no edital oficial.'}</p>
            </div>

            <a href="${c.link_edital}" target="_blank" class="btn-acao btn-inscricao">📄 ACESSAR EDITAL OFICIAL</a>
            <a href="questoes.html?banca=${encodeURIComponent(c.banca)}" class="btn-acao btn-questoes">✍️ TREINAR COM QUESTÕES</a>
        `;
    }

    function renderizarArtigo(a) {
        const container = document.getElementById('conteudo-dinamico');
        document.title = `${a.titulo} - Blog MA Pro`;

        container.innerHTML = `
            <div class="header-content">
                <span class="status-tag" style="background: #3b82f6;">${a.categoria}</span>
                <h1>${a.titulo}</h1>
                <p>📅 Postado em: ${fmtData(a.created_at)}</p>
            </div>
            
            <img src="${a.capa_url || 'https://via.placeholder.com/800x400'}" class="capa-artigo" onerror="this.style.display='none'">

            <div class="artigo-corpo">
                ${a.conteudo || '<p>Conteúdo em breve...</p>'}
            </div>
            
            <a href="blog.html" class="btn-acao">📖 VER OUTRAS NOTÍCIAS</a>
        `;
    }

    document.addEventListener('DOMContentLoaded', carregarConteudo);
</script>
</body>
</html>
