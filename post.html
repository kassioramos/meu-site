<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concursos Maranhão Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --primary: #3b82f6;
        --text-main: #f8fafc;
        --text-sub: #cbd5e1;
        --text-meta: #94a3b8;
        --border: rgba(255, 255, 255, 0.1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text-main);
        line-height: 1.8;
    }

    /* Barra de Progresso */
    #progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 4px;
        background: var(--primary);
        width: 0%;
        z-index: 9999;
        transition: width 0.1s ease;
    }

    .container {
        max-width: 850px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .btn-voltar {
        color: var(--primary);
        text-decoration: none;
        font-weight: bold;
        display: inline-block;
        margin-bottom: 25px;
        transition: 0.3s;
    }

    .btn-voltar:hover {
        transform: translateX(-5px);
    }

    /* --- CABEÇALHO DO POST --- */
    .header-post {
        text-align: center;
        margin-bottom: 40px;
    }

    .categoria {
        background: var(--primary);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-weight: 800;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .header-post h1 {
        font-size: 2.8rem;
        margin: 20px 0;
        line-height: 1.1;
        color: white;
        font-weight: 800;
    }

    .meta {
        color: var(--text-meta);
        font-size: 0.95rem;
    }

    /* --- IMAGEM DE CAPA --- */
    .img-box {
        width: 100%;
        max-height: 480px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        border-radius: 16px;
        margin-bottom: 50px;
        background: #111827;
        border: 1px solid var(--border);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .capa {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* --- CONTEÚDO --- */
    .conteudo {
        font-size: 1.2rem;
        color: var(--text-sub);
    }

    .conteudo p { margin-bottom: 25px; }

    /* Letra Capitular (Premium) */
    .conteudo p:first-of-type::first-letter {
        font-size: 3.5rem;
        font-weight: 800;
        float: left;
        margin-right: 10px;
        line-height: 1;
        color: var(--primary);
    }

    .conteudo h2 {
        color: var(--primary);
        font-size: 2rem;
        margin-top: 45px;
        margin-bottom: 20px;
        font-weight: 800;
    }

    .conteudo h3 {
        color: white;
        font-size: 1.6rem;
        margin-top: 35px;
        margin-bottom: 15px;
    }

    .conteudo blockquote {
        border-left: 5px solid var(--primary);
        padding: 25px;
        background: rgba(59, 130, 246, 0.08);
        font-style: italic;
        margin: 40px 0;
        border-radius: 0 12px 12px 0;
        color: #f1f5f9;
    }

    .conteudo ul { margin: 25px 0; padding-left: 25px; }
    .conteudo li { margin-bottom: 12px; }

    @media(max-width: 768px) {
        .header-post h1 { font-size: 2rem; }
        .img-box { max-height: 280px; }
        .conteudo { font-size: 1.1rem; }
    }
</style>
</head>
<body>

    <div id="progress-bar"></div>

    <div class="container">
        <a href="blog.html" class="btn-voltar">← Voltar ao Blog</a>

        <div id="render-post">
            <p style="text-align:center; padding:50px;">Carregando...</p>
        </div>
    </div>

    <script>
        const URL_SB = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
        const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';

        const _sb = supabase.createClient(URL_SB, KEY_SB);

        function formatarConteudoAutomatico(texto) {
            if(!texto) return 'Sem conteúdo.';
            return texto
                .split('\n\n')
                .map(bloco => {
                    bloco = bloco.trim();
                    if (bloco.startsWith('## ')) return `<h2>${bloco.replace('## ', '')}</h2>`;
                    if (bloco.startsWith('### ')) return `<h3>${bloco.replace('### ', '')}</h3>`;
                    if (bloco.startsWith('> ')) return `<blockquote>${bloco.replace('> ', '')}</blockquote>`;
                    if (bloco.startsWith('- ')) {
                        const itens = bloco.split('\n').map(i => `<li>${i.replace('- ', '')}</li>`).join('');
                        return `<ul>${itens}</ul>`;
                    }
                    return `<p>${bloco}</p>`;
                }).join('');
        }

        async function carregarPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                document.getElementById('render-post').innerHTML = '<p style="text-align:center;">Post não encontrado.</p>';
                return;
            }

            try {
                const { data: post, error } = await _sb
                    .from('artigos')
                    .select('*')
                    .eq('slug', slug)
                    .maybeSingle();

                if (post) {
                    document.title = post.titulo;
                    
                    document.getElementById('render-post').innerHTML = `
                        <div class="header-post">
                            <span class="categoria">${post.categoria || 'Notícias'}</span>
                            <h1>${post.titulo}</h1>
                            <div class="meta">Postado em ${new Date(post.created_at).toLocaleDateString('pt-BR')}</div>
                        </div>

                        ${post.capa_url ? `
                            <div class="img-box">
                                <img src="${post.capa_url}" class="capa" alt="Capa">
                            </div>
                        ` : ''}

                        <div class="conteudo">
                            ${formatarConteudoAutomatico(post.conteudo)}
                        </div>

                        <div style="margin-top: 60px; padding: 40px; background: var(--card); border-radius: 20px; border: 1px solid var(--primary); text-align: center;">
                            <h4 style="margin-bottom: 10px; color: white; font-size: 1.5rem;">Gostou dessa análise?</h4>
                            <p style="font-size: 1.1rem; margin-bottom: 25px; color: var(--text-sub);">Não perca nenhum edital do Maranhão. Entre no nosso grupo VIP de estudos.</p>
                            <a href="#" style="background: var(--primary); color: white; text-decoration: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; display: inline-block; transition: 0.3s;">Participar Agora →</a>
                        </div>
                    `;
                } else {
                    document.getElementById('render-post').innerHTML = '<p style="text-align:center;">Artigo não encontrado.</p>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        window.onload = carregarPost;

        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            const progressBar = document.getElementById("progress-bar");
            if (progressBar) {
                progressBar.style.width = scrolled + "%";
            }
        };
    </script>

</body>
</html>
