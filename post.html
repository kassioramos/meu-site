<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lendo Artigo - Concursos MA Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.8;
        }

        .container-post { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        .capa-post {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .meta-info { color: var(--primary); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        h1 { font-size: 2.5rem; margin: 10px 0 20px 0; line-height: 1.2; }
        .data { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: block; }
        
        .conteudo-texto { font-size: 1.1rem; color: #cbd5e1; }
        .conteudo-texto p { margin-bottom: 25px; }

        .btn-voltar { color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container-post">
    <a href="blog.html" class="btn-voltar">← Voltar para o Blog</a>
    
    <div id="artigo-completo">
        <p>Carregando artigo...</p>
    </div>
</div>

<script>
    async function carregarArtigo() {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const container = document.getElementById('artigo-completo');

        if (!slug) {
            container.innerHTML = "❌ Artigo não encontrado.";
            return;
        }

        try {
            // LEMBRE-SE DE USAR SUA URL DO RENDER
            const response = await fetch(`https://meu-site-aodm.onrender.com/artigos/${slug}`);
            if (!response.ok) throw new Error('Erro ao buscar post');
            
            const post = await response.json();

            const dataFormatada = new Date(post.created_at).toLocaleDateString('pt-BR', {
                day: '2-digit', month: 'long', year: 'numeric'
            });

            container.innerHTML = `
                <img src="${post.capa_url}" class="capa-post" alt="${post.titulo}">
                <span class="meta-info">${post.categoria}</span>
                <h1>${post.titulo}</h1>
                <span class="data">Publicado em ${dataFormatada} • Por ${post.autor}</span>
                <div class="conteudo-texto">
                    ${post.conteudo.replace(/\n/g, '<br>')}
                </div>
            `;

            document.title = `${post.titulo} - Concursos MA Pro`;

        } catch (error) {
            container.innerHTML = "❌ Erro ao carregar o conteúdo.";
            console.error(error);
        }
    }

    window.onload = carregarArtigo;
</script>

</body>
</html>
