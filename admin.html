<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Concursos Maranhão Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #10b981; --text: #f8fafc; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        /* Centralizar Login */
        #loginSection { max-width: 400px; margin: 80px auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        
        .admin-container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #94a3b8; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
            background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box;
        }
        
        textarea { height: 250px; resize: vertical; font-family: monospace; }
        
        .btn-salvar { 
            background: var(--primary); color: white; border: none; padding: 15px 30px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        
        .btn-salvar:hover { background: #059669; transform: translateY(-2px); }
        
        .mensagem { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<section id="loginSection">
    <form onsubmit="event.preventDefault(); fazerLogin();">
        <h2 style="margin-bottom: 10px;">🔒 Acesso Restrito</h2>
        <p style="color: #94a3b8; margin-bottom: 25px;">Entre com suas credenciais</p>
        
        <input type="email" id="emailAdmin" placeholder="E-mail" autocomplete="username" required>
        <input type="password" id="senhaAdmin" placeholder="Senha" autocomplete="current-password" required>
        
        <button type="submit" class="btn-salvar" id="btnLogin">Entrar no Painel</button>
    </form>
</section>

<div id="adminContent" style="display: none;">
    <div class="admin-container">
        <div class="header-admin">
            <div>
                <h1 style="margin: 0;">🚀 Novo Post</h1>
                <p style="color: #94a3b8; margin: 5px 0 0 0;">Publique conteúdo para o blog</p>
            </div>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </div>

        <form id="formPost">
            <div class="form-group">
                <label>Título do Artigo</label>
                <input type="text" id="titulo" placeholder="Ex: Guia Definitivo PAES UEMA 2026" required>
            </div>

            <div class="form-group">
                <label>Slug (URL Amigável)</label>
                <input type="text" id="slug" placeholder="guia-definitivo-uema-2026" readonly required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
            <label>Categoria</label>
            <select id="categoria" required>
            <option value="noticias">📰 Notícias</option> <option value="concursos">🏛️ Concursos</option>
            <option value="uema">🏹 UEMA</option>
            <option value="enem">🎓 ENEM</option>
            <option value="dev">💻 Desenvolvimento</option>
            <option value="dicas">🧠 Dicas de Estudo</option>
            </select>
            </div>    

                <div class="form-group">
                    <label>URL da Capa (Imagem)</label>
                    <input type="text" id="capa_url" placeholder="Link da imagem (ex: imgur.com/abc.jpg)" required>
                </div>
            </div>

            <div class="form-group">
                <label>Resumo Curto (Para a listagem)</label>
                <input type="text" id="resumo" maxlength="200" placeholder="Uma breve descrição do que trata o artigo..." required>
            </div>

            <div class="form-group">
                <label>Conteúdo (HTML ou Texto Plano)</label>
                <textarea id="conteudo" placeholder="Escreva aqui o corpo do seu artigo..." required></textarea>
            </div>

            <button type="submit" class="btn-salvar" id="btnPublicar" formnovalidate>Publicar Artigo Agora</button>
            <div id="statusMsg" class="mensagem"></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Configurações do Supabase
    const supabaseUrl = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Seletores
    const form = document.getElementById('formPost');
    const msg = document.getElementById('statusMsg');

    // 1. LÓGICA DE AUTENTICAÇÃO
    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        }
    }

    async function fazerLogin() {
        const email = document.getElementById('emailAdmin').value;
        const password = document.getElementById('senhaAdmin').value;
        const btn = document.getElementById('btnLogin');

        btn.innerText = "Verificando...";
        const { error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Acesso Negado: " + error.message);
            btn.innerText = "Entrar no Painel";
        } else {
            checkUser();
        }
    }

    async function logout() {
        await _supabase.auth.signOut();
        location.reload();
    }

    // 2. GERADOR DE SLUG AUTOMÁTICO
    document.getElementById('titulo').addEventListener('input', function() {
        const slug = this.value
            .toLowerCase()
            .trim()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '') // Remove acentos
            .replace(/[^\w ]+/g, '')        // Remove caracteres especiais
            .replace(/ +/g, '-');           // Substitui espaços por traços
        document.getElementById('slug').value = slug;
    });

    // 3. ENVIO DOS DADOS
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnPublicar');
        btn.disabled = true;
        msg.style.display = 'block';
        msg.style.background = '#3b82f6';
        msg.innerText = "⏳ Enviando para o banco de dados...";

        const novoPost = {
            titulo: document.getElementById('titulo').value,
            slug: document.getElementById('slug').value,
            categoria: document.getElementById('categoria').value,
            capa_url: document.getElementById('capa_url').value,
            resumo: document.getElementById('resumo').value,
            conteudo: document.getElementById('conteudo').value,
            created_at: new Date()
        };

        const { data, error } = await _supabase
            .from('artigos')
            .insert([novoPost])
            .select();

        if (error) {
            msg.style.background = '#ef4444';
            msg.innerText = "❌ Erro: " + error.message;
            console.error(error);
            btn.disabled = false;
        } else {
            msg.style.background = '#10b981';
            msg.innerText = "🚀 Artigo publicado com sucesso!";
            form.reset();
            setTimeout(() => { 
                msg.style.display = 'none';
                btn.disabled = false;
            }, 5000);
        }
    });

    // Inicia verificando sessão
    checkUser();
</script>

</body>
</html>
