<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Postar Artigo</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #10b981; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #94a3b8; }
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); 
            background: #0f172a; color: white; font-size: 1rem;
        }
        textarea { height: 200px; resize: vertical; }
        .btn-salvar { 
            background: var(--primary); color: white; border: none; padding: 15px 30px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .btn-salvar:hover { background: #059669; transform: translateY(-2px); }
        .mensagem { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        
        /* Estilo da seção de Login */
        #loginSection { max-width: 400px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        #loginSection input { margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="loginSection">
    <h2 style="margin-bottom: 20px;">🔒 Acesso Restrito</h2>
    <input type="email" id="emailAdmin" placeholder="Seu e-mail de admin">
    <input type="password" id="senhaAdmin" placeholder="Sua senha">
    <button onclick="fazerLogin()" class="btn-salvar">Entrar no Painel</button>
</div>

<div id="adminContent" style="display: none;">
    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🚀 Novo Post</h1>
            <button onclick="logout()" style="background: transparent; color: #ef4444; border: none; cursor: pointer;">Sair</button>
        </div>
        <p>Preencha os campos abaixo para publicar no site.</p>
        <hr style="opacity: 0.1; margin: 20px 0;">

        <form id="formPost">
            <div class="form-group">
                <label>Título do Artigo</label>
                <input type="text" id="titulo" placeholder="Ex: Guia Completo UEMA 2026" required>
            </div>

            <div class="form-group">
                <label>Slug (Automático)</label>
                <input type="text" id="slug" required>
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select id="categoria" required>
                    <option value="concursos">🏛️ Concursos</option>
                    <option value="enem">🎓 ENEM</option>
                    <option value="uema">🏹 UEMA</option>
                    <option value="dev">💻 Desenvolvimento</option>
                    <option value="dicas">🧠 Dicas de Estudo</option>
                </select>
            </div>

            <div class="form-group">
                <label>URL da Imagem de Capa</label>
                <input type="url" id="capa_url" placeholder="https://linkdaimagem.com/foto.jpg">
            </div>

            <div class="form-group">
                <label>Resumo</label>
                <input type="text" id="resumo" required>
            </div>

            <div class="form-group">
                <label>Conteúdo (Texto Completo)</label>
                <textarea id="conteudo" required></textarea>
            </div>

            <button type="submit" class="btn-salvar">Publicar Artigo Agora</button>
            <div id="statusMsg" class="mensagem"></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Configurações (Use suas chaves reais aqui)
    const supabaseUrl = 'postgresql://postgres.mczmhvuxujvhrudqmpvg:ANTONIOCASSIO2010Mariano@aws-1-us-east-1.pooler.supabase.com:5432/postgres';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('formPost');
    const msg = document.getElementById('statusMsg');

    // --- LÓGICA DE AUTENTICAÇÃO ---

    // Verificar se já está logado
    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        }
    }

    async function fazerLogin() {
        const email = document.getElementById('emailAdmin').value;
        const password = document.getElementById('senhaAdmin').value;

        const { error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Erro: " + error.message);
        } else {
            checkUser(); // Mostra o painel se logar com sucesso
        }
    }

    async function logout() {
        await _supabase.auth.signOut();
        location.reload();
    }

    // --- LÓGICA DE POSTAGEM ---

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.style.display = 'block';
        msg.style.background = '#3b82f6';
        msg.innerText = "Publicando...";

        const novoPost = {
            titulo: document.getElementById('titulo').value,
            slug: document.getElementById('slug').value,
            categoria: document.getElementById('categoria').value,
            capa_url: document.getElementById('capa_url').value,
            resumo: document.getElementById('resumo').value,
            conteudo: document.getElementById('conteudo').value,
            autor: "Kassio Ramos"
        };

        const { data, error } = await _supabase.from('artigos').insert([novoPost]);

        if (error) {
            msg.style.background = '#ef4444';
            msg.innerText = "Erro ao publicar: " + error.message;
        } else {
            msg.style.background = '#10b981';
            msg.innerText = "🚀 Post publicado com sucesso!";
            form.reset();
        }
    });

    document.getElementById('titulo').addEventListener('input', function() {
        const slug = this.value.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
        document.getElementById('slug').value = slug;
    });

    // Inicia verificando se você já está logado
    checkUser();
</script>

</body>
</html>
