<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Concursos Maranhão Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #10b981; --text: #f8fafc; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }

        .menu-admin{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}
.menu-admin button{
    background:#334155;
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
.menu-admin button:hover{
    background:#3b82f6;
}
.secao-admin{
    display:none;
}
        
        #loginSection { max-width: 400px; margin: 80px auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .admin-container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #94a3b8; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
            background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box;
        }
        
        textarea { height: 300px; resize: vertical; font-family: 'Courier New', Courier, monospace; line-height: 1.6; }
        
        .btn-salvar { 
            background: var(--primary); color: white; border: none; padding: 15px 30px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        
        .btn-salvar:hover:not(:disabled) { background: #059669; transform: translateY(-2px); }
        .btn-salvar:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .mensagem { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<section id="loginSection">
    <form onsubmit="event.preventDefault(); fazerLogin();">
        <h2 style="margin-bottom: 10px;">🔒 Painel do Mestre</h2>
        <p style="color: #94a3b8; margin-bottom: 25px;">Kassio, entre para gerenciar o conteúdo</p>
        <input type="email" id="emailAdmin" placeholder="Seu e-mail" required style="margin-bottom: 15px;">
        <input type="password" id="senhaAdmin" placeholder="Sua senha" required style="margin-bottom: 15px;">
        <button type="submit" class="btn-salvar" id="btnLogin">Acessar Sistema</button>
    </form>
</section>

<div id="adminContent" style="display: none;">
    <div class="admin-container">
        <div class="header-admin">
            <div class="menu-admin">
    <button onclick="mostrarSecao('artigo')">📄 Publicar Artigo</button>
    <button onclick="mostrarSecao('questao')">❓ Cadastrar Questão</button>
    <button onclick="mostrarSecao('concurso')">🏛️ Cadastrar Concurso</button>
    <button onclick="mostrarSecao('excluir')">🗑️ Excluir</button>
</div>
            <div>
                <h1 style="margin: 0;">🚀 Novo Artigo</h1>
                <p style="color: #94a3b8; margin: 5px 0 0 0;">Publicando no Concursos Maranhão Pro</p>
            </div>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </div>

        <form id="formPost" class="secao-admin" style="display:block;">
            <div class="form-group">
                <label>Título do Artigo</label>
                <input type="text" id="titulo" placeholder="Ex: Dicas de Estudo para a UEMA" required>
            </div>

            <div class="form-group">
                <label>Slug (URL Amigável)</label>
                <input type="text" id="slug" placeholder="slug-gerado-automaticamente" readonly required style="opacity: 0.7; cursor: not-allowed;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="categoria" required>
                        <option value="Notícias">Notícias</option> 
                        <option value="Concursos">Concursos</option>
                        <option value="UEMA">UEMA</option>
                        <option value="ENEM">ENEM</option>
                        <option value="Desenvolvimento">Desenvolvimento</option>
                        <option value="Dicas de Estudo">Dicas de Estudo</option>
                    </select>
                </div>    

                <div class="form-group">
                    <label>URL da Capa (Imagem)</label>
                    <input type="text" id="capa_url" placeholder="https://exemplo.com/foto.jpg" required>
                </div>
            </div>

            <div class="form-group">
                <label>Resumo Curto</label>
                <input type="text" id="resumo" maxlength="200" placeholder="Breve introdução para atrair o clique..." required>
            </div>

            <div class="form-group">
                <label>Conteúdo (Aceita Tags HTML)</label>
                <textarea id="conteudo" placeholder="Dica: Use <h2> para subtítulos e <p> para parágrafos..." required></textarea>
            </div>

            <button type="submit" class="btn-salvar" id="btnPublicar">Publicar Artigo Agora</button>
            <div id="statusMsg" class="mensagem"></div>
        </form>
        <div id="formQuestao" class="secao-admin">
    <h2>❓ Nova Questão</h2>
    <input id="disciplina" placeholder="Disciplina"><br><br>
    <input id="banca" placeholder="Banca"><br><br>
    <textarea id="enunciadoQuestao" placeholder="Enunciado"></textarea><br><br>
    <input id="altA" placeholder="Alternativa A"><br><br>
    <input id="altB" placeholder="Alternativa B"><br><br>
    <input id="altC" placeholder="Alternativa C"><br><br>
    <input id="altD" placeholder="Alternativa D"><br><br>
    <input id="correta" placeholder="Alternativa correta (a,b,c,d)"><br><br>
    <textarea id="comentario" placeholder="Comentário do professor"></textarea><br><br>
    <button class="btn-salvar" onclick="salvarQuestao()">Salvar Questão</button>
</div>

<div id="formConcurso" class="secao-admin">
    <h2>🏛️ Novo Concurso</h2>

    <input id="orgao" placeholder="Órgão"><br><br>
    <input id="cidade" placeholder="Cidade"><br><br>
    <input id="bancaConcurso" placeholder="Banca"><br><br>
    <input id="statusConcurso" placeholder="Status"><br><br>
    <input id="cargos" placeholder="Cargos"><br><br>
    <input id="salarioMin" placeholder="Salário mínimo"><br><br>
    <input id="salarioMax" placeholder="Salário máximo"><br><br>
    <input id="faixaSalarial" placeholder="Faixa salarial"><br><br>
    <input id="dataProva" placeholder="Data da prova"><br><br>
    <input id="linkOficial" placeholder="Link oficial"><br><br>
    <input id="linkInscricao" placeholder="Link inscrição"><br><br>
    <input id="escolaridade" placeholder="Escolaridade"><br><br>
    <input id="inicioInscricao" type="date"><br><br>
    <input id="fimInscricao" type="date"><br><br>
    <input id="valorInscricao" placeholder="Valor inscrição"><br><br>

    <button class="btn-salvar" onclick="salvarConcurso()">Salvar Concurso</button>
</div>

<div id="secaoExcluir" class="secao-admin">
    <h2>🗑️ Excluir Conteúdo</h2>
    <select id="tipoExcluir">
        <option value="artigos">Artigo</option>
        <option value="questoes">Questão</option>
        <option value="concursos">Concurso</option>
    </select><br><br>
    <input id="idExcluir" placeholder="ID"><br><br>
    <button class="btn-salvar" onclick="excluirItem()">Excluir</button>
</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const URL_SB = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _supabase = supabase.createClient(URL_SB, KEY_SB);

    const form = document.getElementById('formPost');
    const msg = document.getElementById('statusMsg');

    // 1. Controle de Sessão
    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        }
    }

    async function fazerLogin() {
        const email = document.getElementById('emailAdmin').value;
        const password = document.getElementById('senhaAdmin').value;
        const btn = document.getElementById('btnLogin');

        btn.innerText = "Autenticando...";
        btn.disabled = true;

        const { error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Erro no login: " + error.message);
            btn.innerText = "Entrar no Painel";
            btn.disabled = false;
        } else {
            checkUser();
        }
    }

    async function logout() {
        await _supabase.auth.signOut();
        location.reload();
    }

    // 2. Gerador de Slug (Limpo)
    document.getElementById('titulo').addEventListener('input', function() {
        const slug = this.value
            .toLowerCase()
            .trim()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '') // Remove acentos
            .replace(/[^a-z0-9 ]/g, '')      // Remove símbolos
            .replace(/\s+/g, '-');           // Espaço vira traço
        document.getElementById('slug').value = slug;
    });

    // 3. Inserção no Supabase
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnPublicar');
        btn.disabled = true;
        btn.innerText = "🚀 Publicando...";
        
        msg.style.display = 'block';
        msg.style.background = '#3b82f6';
        msg.innerText = "Aguarde, salvando conteúdo...";

        const dados = {
            titulo: document.getElementById('titulo').value,
            slug: document.getElementById('slug').value,
            categoria: document.getElementById('categoria').value, // Envia o texto puro
            capa_url: document.getElementById('capa_url').value,
            resumo: document.getElementById('resumo').value,
            conteudo: document.getElementById('conteudo').value,
            created_at: new Date()
        };

        const { error } = await _supabase.from('artigos').insert([dados]);

        if (error) {
            msg.style.background = '#ef4444';
            msg.innerText = "❌ Erro ao salvar: " + error.message;
            btn.disabled = false;
            btn.innerText = "Tentar Publicar Novamente";
        } else {
            msg.style.background = '#10b981';
            msg.innerText = "✅ Post publicado com sucesso!";
            form.reset();
            btn.disabled = false;
            btn.innerText = "Publicar Artigo Agora";
            setTimeout(() => { msg.style.display = 'none'; }, 5000);
        }
    });
function mostrarSecao(secao){
    document.getElementById('formPost').style.display='none';
    document.getElementById('formQuestao').style.display='none';
    document.getElementById('formConcurso').style.display='none';
    document.getElementById('secaoExcluir').style.display='none';

    const titulo = document.querySelector('.header-admin h1');
    const subtitulo = document.querySelector('.header-admin p');

    if(secao==='artigo'){
        document.getElementById('formPost').style.display='block';
        titulo.innerText = '🚀 Novo Artigo';
        subtitulo.innerText = 'Publicando no Concursos Maranhão Pro';
    }

    if(secao==='questao'){
        document.getElementById('formQuestao').style.display='block';
        titulo.innerText = '❓ Nova Questão';
        subtitulo.innerText = 'Cadastrando questão no sistema';
    }

    if(secao==='concurso'){
        document.getElementById('formConcurso').style.display='block';
        titulo.innerText = '🏛️ Novo Concurso';
        subtitulo.innerText = 'Cadastrando concurso no sistema';
    }

    if(secao==='excluir'){
        document.getElementById('secaoExcluir').style.display='block';
        titulo.innerText = '🗑️ Excluir Conteúdo';
        subtitulo.innerText = 'Removendo conteúdo do sistema';
    }
}
async function salvarQuestao(){
    const dados = {
        disciplina: document.getElementById('disciplina').value,
        banca: document.getElementById('banca').value,
        enunciado: document.getElementById('enunciadoQuestao').value,
        opcoes: {
            a: document.getElementById('altA').value,
            b: document.getElementById('altB').value,
            c: document.getElementById('altC').value,
            d: document.getElementById('altD').value
        },
        alternativa_correta: document.getElementById('correta').value,
        comentario_professor: document.getElementById('comentario').value,
        created_at: new Date()
    };

    const { error } = await _supabase.from('questoes').insert([dados]);

    if(error){
        alert('Erro ao salvar questão: ' + error.message);
    } else {
        alert('Questão salva com sucesso!');
    }
}

async function salvarConcurso(){
    const dados = {
        orgao: document.getElementById('orgao').value,
        cidade: document.getElementById('cidade').value,
        banca: document.getElementById('bancaConcurso').value,
        status: document.getElementById('statusConcurso').value,
        cargos: document.getElementById('cargos').value,
        salario_min: document.getElementById('salarioMin').value,
        salario_max: document.getElementById('salarioMax').value,
        faixa_salarial: document.getElementById('faixaSalarial').value,
        data_prova: document.getElementById('dataProva').value,
        link_oficial: document.getElementById('linkOficial').value,
        link_inscricao: document.getElementById('linkInscricao').value,
        escolaridade: document.getElementById('escolaridade').value,
        inicio_inscricao: document.getElementById('inicioInscricao').value,
        fim_inscricao: document.getElementById('fimInscricao').value,
        valor_inscricao: document.getElementById('valorInscricao').value
    };

    const { error } = await _supabase.from('concursos').insert([dados]);

    if(error){
        alert('Erro ao salvar concurso: ' + error.message);
    } else {
        alert('Concurso salvo com sucesso!');
    }
}

async function excluirItem(){
    const tabela = tipoExcluir.value;
    const id = idExcluir.value;
    await _supabase.from(tabela).delete().eq('id', id);
    alert('Excluído com sucesso!');
}

    checkUser();
</script>
</body>
</html>
