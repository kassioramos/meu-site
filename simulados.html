<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulados - Concursos Maranhão</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --uema: #f97316;
            --enem: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 10px; }

        /* Seletor de Modo (Concurso, UEMA, ENEM) */
        .seletor-modo {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-modo {
            background: var(--card-bg);
            border: 2px solid var(--border);
            color: var(--text-sub);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-modo.active[data-modo="concurso"] { border-color: var(--primary); color: white; background: rgba(59, 130, 246, 0.1); }
        .btn-modo.active[data-modo="uema"] { border-color: var(--uema); color: white; background: rgba(249, 115, 22, 0.1); }
        .btn-modo.active[data-modo="enem"] { border-color: var(--enem); color: white; background: rgba(16, 185, 129, 0.1); }

        /* Grid de Filtros Dinâmicos */
        .filtros-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .campo-busca label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-sub); }
        
        .select-custom {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        .btn-buscar {
            grid-column: 1 / -1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Área de Questões */
        #lista-questoes { margin-top: 30px; }
        .aviso { text-align: center; color: var(--text-sub); padding: 50px; }

        .btn-voltar { color: var(--primary); text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-voltar">← Voltar</a>

    <header>
        <h1>Banco de Questões</h1>
        <p>Escolha seu foco e comece a treinar</p>
    </header>

    <div class="seletor-modo">
        <button class="btn-modo active" data-modo="concurso" onclick="mudarModo('concurso')">🏛️ Concursos</button>
        <button class="btn-modo" data-modo="uema" onclick="mudarModo('uema')">🏹 UEMA</button>
        <button class="btn-modo" data-modo="enem" onclick="mudarModo('enem')">🎓 ENEM</button>
    </div>

    <div class="filtros-container">
        <div class="campo-busca" id="filtro-1">
            <label id="label-1">Banca</label>
            <select class="select-custom" id="select-1">
                <option value="">Todas as Bancas</option>
                <option value="fgv">FGV</option>
                <option value="fcc">FCC</option>
                <option value="vunesp">Vunesp</option>
            </select>
        </div>

        <div class="campo-busca" id="filtro-2">
            <label id="label-2">Matéria</label>
            <select class="select-custom" id="select-2">
                <option value="">Todas as Matérias</option>
                <option value="portugues">Português</option>
                <option value="rlm">Raciocínio Lógico</option>
                <option value="direito">Direito Administrativo</option>
            </select>
        </div>

        <div class="campo-busca" id="filtro-3">
            <label id="label-3">Assunto</label>
            <select class="select-custom" id="select-3">
                <option value="">Todos os Assuntos</option>
            </select>
        </div>

        <button class="btn-buscar" onclick="buscarQuestoes()">🔍 Filtrar Questões</button>
    </div>

    <div id="lista-questoes">
        <div class="aviso">Selecione os filtros acima para carregar as questões.</div>
    </div>
</div>

<script>
    function mudarModo(modo) {
        // Atualiza botões
        document.querySelectorAll('.btn-modo').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        const label1 = document.getElementById('label-1');
        const label2 = document.getElementById('label-2');
        const select1 = document.getElementById('select-1');

        if (modo === 'concurso') {
            label1.innerText = "Banca";
            label2.innerText = "Matéria";
            select1.innerHTML = '<option value="">Todas as Bancas</option><option value="fgv">FGV</option><option value="fcc">FCC</option>';
        } else if (modo === 'uema' || modo === 'enem') {
            label1.innerText = "Área do Conhecimento";
            label2.innerText = "Disciplina";
            select1.innerHTML = `
                <option value="">Selecione a Área</option>
                <option value="natureza">Ciências da Natureza</option>
                <option value="humanas">Ciências Humanas</option>
                <option value="linguagens">Linguagens</option>
                <option value="matematica">Matemática</option>
            `;
        }
    }

    async function buscarQuestoes() {
        const grid = document.getElementById('lista-questoes');
        grid.innerHTML = "<div class='aviso'>Buscando questões no banco de dados...</div>";
        
        // Aqui você fará o fetch para sua API no Render
        // Ex: fetch(`https://sua-api.com/questoes?modo=${modoSelecionado}...`)
    }
</script>

</body>
</html>
