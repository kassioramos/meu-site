<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Concurso - Pro</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; }
        .container-detalhes { max-width: 800px; margin: 40px auto; padding: 20px; }
        .btn-voltar { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 600; }
        .detalhes-card { background: var(--card-bg); border-radius: 12px; padding: 30px; border-top: 5px solid var(--primary); }
        .detalhes-header h1 { color: var(--primary); margin: 10px 0; font-size: 1.8rem; }
        .grid-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .info-item { background: rgba(59, 130, 246, 0.05); padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .info-item label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 6px; }
        .info-item span { font-size: 1rem; font-weight: 700; }
        .sobre-secao { line-height: 1.8; background: rgba(0,0,0,0.2); padding: 25px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .btn-edital { display: block; width: 100%; text-align: center; background: var(--primary); color: white; padding: 16px; border-radius: 8px; text-decoration: none; font-weight: 700; margin-top: 15px; }
        .btn-inscricao { background: #10b981; }
        .status-tag { background: #10b981; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container-detalhes">
    <a href="index.html" class="btn-voltar">← Voltar para a lista</a>
    <div id="conteudo-detalhes" class="detalhes-card">
        <div class="loading-msg">Carregando informações detalhadas...</div>
    </div>
</div>

<script>
    // Formatação de Moeda
    const fmtMoeda = (v) => v ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v) : 'Consultar Edital';

    // Formatação de Datas padrão (Início/Fim Inscrição)
    const fmtData = (d) => {
        if (!d || d === 'null') return 'A definir';
        try {
            return new Date(d).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
        } catch(e) { return 'A definir'; }
    };

    // Função para Data da Prova (Aceita Data ou Texto como "A definir")
    const exibirDataProva = (valor) => {
        if (!valor || valor.toString().toLowerCase() === 'null') return 'A definir';
        
        // Verifica se é uma data no formato YYYY-MM-DD
        const regexData = /^\d{4}-\d{2}-\d{2}/;
        if (regexData.test(valor)) {
            return new Date(valor).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
        }
        
        // Se for texto puro (ex: "A definir", "Previsto"), retorna o próprio texto
        return valor;
    };

    async function carregarDetalhes() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const container = document.getElementById('conteudo-detalhes');

        if (!id) {
            container.innerHTML = "❌ Erro: Concurso não identificado.";
            return;
        }

        try {
            const response = await fetch(`/concursos/${id}`);
            if (!response.ok) throw new Error('Falha ao buscar dados');
            const c = await response.json();

            container.innerHTML = `
                <div class="detalhes-header">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="status-tag">${c.status || 'Aberto'}</span>
                    </div>
                    <h1>${c.orgao}</h1>
                </div>

                <div class="grid-info">
                    <div class="info-item"><label>📍 Localização</label><span>${c.cidade || 'Maranhão'}</span></div>
                    <div class="info-item"><label>🏢 Banca</label><span>${c.banca || c.Banca || 'Própria'}</span></div>
                    <div class="info-item"><label>🎓 Nível</label><span>${c.escolaridade || 'Ver edital'}</span></div>
                    <div class="info-item"><label>💰 Salário Máx.</label><span style="color:#10b981">${fmtMoeda(c.salario_max)}</span></div>
                    <div class="info-item"><label>📅 Inscrições</label><span>${fmtData(c.inicio_inscricao)} - ${fmtData(c.fim_inscricao)}</span></div>
                    <div class="info-item"><label>📝 Data da Prova</label><span>${exibirDataProva(c.data_prova)}</span></div>
                </div>

                <div class="sobre-secao">
                    <h3 style="color:var(--primary); margin-top:0;">Resumo das Vagas</h3>
                    <p><strong>Cargos:</strong> ${c.cargos || 'Conforme edital'}</p>
                    <hr style="opacity: 0.1; margin: 15px 0;">
                    <p>${c.descricao_seo || 'Descrição em processamento...'}</p>
                </div>

                <div class="container-acoes">
                    ${c.link_oficial ? `<a href="${c.link_oficial}" target="_blank" class="btn-edital">📄 Baixar Edital Oficial</a>` : ''}
                    ${c.link_inscricao ? `<a href="${c.link_inscricao}" target="_blank" class="btn-edital btn-inscricao">📝 Ir para Página de Inscrição</a>` : ''}
                </div>
            `;
        } catch (error) {
            container.innerHTML = "❌ Erro ao carregar detalhes. Verifique sua conexão ou se o concurso ainda existe.";
            console.error(error);
        }
    }

    window.onload = carregarDetalhes;
</script>
</body>
</html>
