<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Concurso - Pro</title>
    <style>
        /* --- VARIÁVEIS E BASE --- */
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --border: rgba(255,255,255,0.1); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.5;
        }

        .container-detalhes { max-width: 800px; margin: 40px auto; padding: 20px; }
        .btn-voltar { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 600; }
        
        /* --- CARD DE DETALHES --- */
        .detalhes-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 30px; 
            border-top: 5px solid var(--primary); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .detalhes-header h1 { color: var(--primary); margin: 10px 0; font-size: 1.8rem; }
        
        /* --- GRID DE INFORMAÇÕES --- */
        .grid-info { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        .info-item { 
            background: rgba(59, 130, 246, 0.05); 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            text-align: center; 
        }

        .info-item label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 6px; }
        .info-item span { font-size: 1rem; font-weight: 700; }

        .sobre-secao { 
            line-height: 1.8; 
            background: rgba(0,0,0,0.2); 
            padding: 25px; 
            border-radius: 12px; 
            border-left: 4px solid var(--primary); 
        }

        /* --- ESTILOS DA TABELA --- */
        .table-container { 
            width: 100%; 
            overflow-x: auto; 
            margin: 15px 0; 
            border-radius: 8px; 
            border: 1px solid var(--border);
        }

        .tabela-vagas { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 500px; 
        }

        .tabela-vagas th { 
            background: rgba(59, 130, 246, 0.15); 
            color: var(--primary); 
            text-align: left; 
            padding: 12px; 
            border-bottom: 1px solid var(--border); 
        }

        .tabela-vagas td { 
            padding: 12px; 
            border-bottom: 1px solid var(--border); 
            color: var(--text-main);
        }

        /* --- BOTÕES DE AÇÃO --- */
        .btn-edital { 
            display: block; 
            width: 100%; 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            margin-top: 15px; 
            transition: opacity 0.2s;
        }

        .btn-inscricao { background: #10b981; }
        .btn-questoes { background: #8b5cf6; } /* Cor Roxa */
        .btn-edital:hover { opacity: 0.9; }
        .status-tag { background: #10b981; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }

        @media (max-width: 600px) {
            .container-detalhes { padding: 10px; margin: 20px auto; }
            .detalhes-card { padding: 20px 15px; }
        }
    </style>
</head>
<body>

<div class="container-detalhes">
    <a href="index.html" class="btn-voltar">← Voltar para a lista</a>
    <div id="conteudo-detalhes" class="detalhes-card">
        <div class="loading-msg">Carregando informações detalhadas...</div>
    </div>
</div>

<script>
    const fmtMoeda = (v) => v ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v) : 'Consultar Edital';

    const fmtData = (d) => {
        if (!d || d === 'null') return 'A definir';
        try {
            return new Date(d).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
        } catch(e) { return 'A definir'; }
    };

    const exibirDataProva = (valor) => {
        if (!valor || valor.toString().toLowerCase() === 'null') return 'A definir';
        const regexData = /^\d{4}-\d{2}-\d{2}/;
        if (regexData.test(valor)) {
            return new Date(valor).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
        }
        return valor;
    };

    async function carregarDetalhes() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const container = document.getElementById('conteudo-detalhes');

        if (!id) {
            container.innerHTML = "❌ Erro: Concurso não identificado.";
            return;
        }

        try {
            // URL DA SUA API NO RENDER OU LOCAL
            const response = await fetch(`/concursos/${id}`);
            if (!response.ok) throw new Error('Falha ao buscar dados');
            const c = await response.json();

            const orgao = c.orgao || 'Não informado';
            const banca = c.banca || 'A definir';
            const sMax = c.salario_max || 0;

            const conteudoVagas = c.tabela_vagas 
                ? `<div class="table-container">${c.tabela_vagas}</div>` 
                : `<p><strong>Cargos:</strong> ${c.cargos || 'Conforme edital'}</p>`;

            container.innerHTML = `
                <div class="detalhes-header">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="status-tag">${c.status || 'Aberto'}</span>
                    </div>
                    <h1>${orgao}</h1>
                </div>

                <div class="grid-info">
                    <div class="info-item"><label>📍 Localização</label><span>${c.cidade || 'Maranhão'}</span></div>
                    <div class="info-item"><label>🏢 Banca</label><span>${banca}</span></div>
                    <div class="info-item"><label>🎓 Nível</label><span>${c.escolaridade || 'Ver edital'}</span></div>
                    <div class="info-item"><label>💰 Salário Máx.</label><span style="color:#10b981">${fmtMoeda(sMax)}</span></div>
                    <div class="info-item"><label>📅 Inscrições</label><span>${fmtData(c.inicio_inscricao)} - ${fmtData(c.fim_inscricao)}</span></div>
                    <div class="info-item"><label>📝 Data da Prova</label><span>${exibirDataProva(c.data_prova)}</span></div>
                </div>

                <div class="sobre-secao">
                    <h3 style="color:var(--primary); margin-top:0;">Distribuição de Vagas</h3>
                    ${conteudoVagas}
                    <hr style="opacity: 0.1; margin: 20px 0;">
                    <p>${c.descricao_seo || 'Confira os detalhes oficiais no edital abaixo.'}</p>
                </div>

                <div class="container-acoes">
                    <a href="questoes.html?banca=${encodeURIComponent(banca)}" class="btn-edital btn-questoes">
                        ✍️ Responder Questões da ${banca}
                    </a>

                    ${c.link_oficial ? `<a href="${c.link_oficial}" target="_blank" class="btn-edital">📄 Baixar Edital Oficial</a>` : ''}
                    ${c.link_inscricao ? `<a href="${c.link_inscricao}" target="_blank" class="btn-edital btn-inscricao">📝 Ir para Página de Inscrição</a>` : ''}
                </div>
            `;
        } catch (error) {
            container.innerHTML = "❌ Erro ao carregar detalhes. Verifique sua conexão.";
            console.error(error);
        }
    }

    window.onload = carregarDetalhes;
</script>
</body>
</html>
