<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Questões - Concursos MA Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .questao-card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .enunciado { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .disciplina { color: #38bdf8; font-size: 0.9em; margin-bottom: 10px; }
        .alternativas-lista { list-style: none; padding: 0; }
        .alternativa-item { background: #334155; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .alternativa-item:hover { background: #475569; }
        #titulo-banca { color: #f8fafc; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
        .aviso-vazio { background: #334155; padding: 20px; border-radius: 10px; text-align: center; border: 1px dashed #38bdf8; }
    </style>
</head>
<body>

    <a href="javascript:history.back()" style="color: #38bdf8; text-decoration: none;">← Voltar</a>
    <h2 id="titulo-banca">Carregando...</h2>
    <div id="lista-questoes">Buscando questões no banco de dados...</div>

    <script>
    async function carregarQuestoes() {
        const params = new URLSearchParams(window.location.search);
        // O decodeURIComponent garante que "Instituto%20JK" vire "Instituto JK" para bater com o banco
        const bancaRaw = params.get('banca') || "Instituto JK";
        const banca = decodeURIComponent(bancaRaw);

        const titulo = document.getElementById('titulo-banca');
        const container = document.getElementById('lista-questoes');

        titulo.innerText = `Questões da banca: ${banca}`;

        // URL ATUALIZADA baseada no seu painel do Render
        const URL_API = `https://meu-site-aodm.onrender.com/questoes?banca=${encodeURIComponent(banca)}`;

        try {
            console.log("Solicitando questões para:", banca);
            const response = await fetch(URL_API);
            
            if (!response.ok) throw new Error("Erro na resposta da rede");
            
            const data = await response.json();
            console.log("Dados brutos do servidor:", data);

            if (data.error) {
                container.innerHTML = `<p style="color:#f87171">Erro no servidor: ${data.error}</p>`;
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = `
                    <div class="aviso-vazio">
                        <h3>Nenhuma questão encontrada.</h3>
                        <p>A busca por "<strong>${banca}</strong>" não retornou resultados.</p>
                        <p><small>Dica: Verifique se o nome no banco de dados é exatamente igual ao da URL.</small></p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(q => {
                // Se o seu Python envia 'opcoes' como objeto/dict
                const opcoes = q.opcoes || {};
                
                return `
                <div class="questao-card">
                    <div class="disciplina">📚 ${q.disciplina || 'Geral'}</div>
                    <p class="enunciado">${q.enunciado}</p>
                    
                    <ul class="alternativas-lista">
                        ${opcoes.a ? `<li class="alternativa-item">A) ${opcoes.a}</li>` : ''}
                        ${opcoes.b ? `<li class="alternativa-item">B) ${opcoes.b}</li>` : ''}
                        ${opcoes.c ? `<li class="alternativa-item">C) ${opcoes.c}</li>` : ''}
                        ${opcoes.d ? `<li class="alternativa-item">D) ${opcoes.d}</li>` : ''}
                        ${opcoes.e ? `<li class="alternativa-item">E) ${opcoes.e}</li>` : ''}
                    </ul>
                </div>`;
            }).join('');

        } catch (error) {
            console.error("ERRO DE CONEXÃO:", error);
            container.innerHTML = `
                <div style="background: #450a0a; padding: 20px; border-radius: 10px; border: 1px solid #f87171;">
                    <p><strong>Erro ao carregar dados.</strong></p>
                    <p>O servidor em Render pode estar iniciando ou o link está incorreto.</p>
                </div>`;
        }
    }

    window.onload = carregarQuestoes;
    </script>
</body>
</html>
