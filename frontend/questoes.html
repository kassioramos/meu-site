<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Questões - Concursos MA Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .questao-card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .enunciado { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .disciplina { color: #38bdf8; font-size: 0.9em; margin-bottom: 10px; }
        .alternativas-lista { list-style: none; padding: 0; }
        .alternativa-item { background: #334155; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .alternativa-item:hover { background: #475569; }
        #titulo-banca { color: #f8fafc; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
    </style>
</head>
<body>

    <h2 id="titulo-banca">Carregando...</h2>
    <div id="lista-questoes">Carregando questões...</div>

    <script>
    async function carregarQuestoes() {
        const params = new URLSearchParams(window.location.search);
        const banca = params.get('banca') || "Geral";

        const titulo = document.getElementById('titulo-banca');
        const container = document.getElementById('lista-questoes');

        titulo.innerText = `Questões: ${banca}`;

        // URL CORRIGIDA conforme seu painel do Render (image_bd8180.png)
        const URL_API = `https://meu-site-aodm.onrender.com/questoes?banca=${encodeURIComponent(banca)}`;

        try {
            console.log("Chamando API:", URL_API);
            const response = await fetch(URL_API);
            const data = await response.json();

            console.log("Dados recebidos:", data);

            if (data.error) {
                container.innerHTML = `<p style="color:red">Erro no banco: ${data.error}</p>`;
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = "<h3>Nenhuma questão encontrada para esta banca.</h3>";
                return;
            }

            container.innerHTML = data.map(q => {
                // Aqui tratamos o campo 'opcoes' que enviamos do Python
                const opcoes = q.opcoes || {};
                return `
                <div class="questao-card">
                    <div class="disciplina">📚 ${q.disciplina || 'Conhecimentos Gerais'}</div>
                    <p class="enunciado">${q.enunciado}</p>
                    
                    <ul class="alternativas-lista">
                        ${opcoes.a ? `<li class="alternativa-item">A) ${opcoes.a}</li>` : ''}
                        ${opcoes.b ? `<li class="alternativa-item">B) ${opcoes.b}</li>` : ''}
                        ${opcoes.c ? `<li class="alternativa-item">C) ${opcoes.c}</li>` : ''}
                        ${opcoes.d ? `<li class="alternativa-item">D) ${opcoes.d}</li>` : ''}
                        ${opcoes.e ? `<li class="alternativa-item">E) ${opcoes.e}</li>` : ''}
                    </ul>
                </div>
                `;
            }).join('');

        } catch (error) {
            console.error("ERRO DE CONEXÃO:", error);
            container.innerHTML = "Erro ao conectar com o servidor. Verifique se o backend no Render está rodando.";
        }
    }

    window.onload = carregarQuestoes;
    </script>
</body>
</html>
