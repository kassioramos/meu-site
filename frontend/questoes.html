<script>
async function carregarQuestoes() {
    const params = new URLSearchParams(window.location.search);
    const banca = params.get('banca');

    document.getElementById('titulo-banca').innerText = `Questões da banca: ${banca}`;

    try {
        const response = await fetch(
            `https://meu-site-aodm.onrender.com/questoes?banca=${encodeURIComponent(banca)}`
        );

        const questoes = await response.json();

        console.log("QUESTOES:", questoes);

        const container = document.getElementById('lista-questoes');

        if (!Array.isArray(questoes) || questoes.length === 0) {
            container.innerHTML = "Nenhuma questão encontrada.";
            return;
        }

        container.innerHTML = questoes.map(q => `
            <div class="questao-card">
                <p class="enunciado">${q.enunciado}</p>
                <div class="alternativa">📚 ${q.disciplina}</div>
            </div>
        `).join('');

    } catch (error) {
        console.error(error);
        document.getElementById('lista-questoes').innerHTML = "Erro ao carregar questões.";
    }
}

window.onload = carregarQuestoes;
</script>
