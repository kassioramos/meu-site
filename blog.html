<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Concursos Maranhão Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --accent: #10b981; 
        }

        /* 1. RESET E CORREÇÃO DE BARRA LATERAL (NÃO REMOVER) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px;
            overflow-x: hidden; /* Mata a barra horizontal */
            min-height: 100vh;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            position: relative; 
            padding: 0 15px;
        }

        /* 2. MENU E BOTÃO ADMIN (RESTAURADOS) */
        .nav-menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-links-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .nav-link {
            text-decoration: none;
            color: var(--text-sub);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .nav-link:hover, .nav-link.active { background: var(--card-bg); color: var(--primary); }

        .btn-post {
            background: #10b981; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-post:hover { background: #059669; transform: scale(1.05); }

        /* 3. HEADER E FILTROS */
        header { text-align: center; margin: 40px 0; }
        header h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        header p { color: var(--text-sub); }

        .filtros-blog { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn-categoria { 
            background: var(--card-bg); border: 1px solid var(--border); 
            color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; 
            transition: 0.3s;
        }
        .btn-categoria.active { background: var(--primary); border-color: var(--primary); }

        /* 4. GRID DE CARDS (CORES E TRANSIÇÕES VOLTARAM) */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .blog-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .blog-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #000; border-bottom: 1px solid var(--border); }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .category { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .uema-tag { color: #f97316; } 
        .enem-tag { color: #10b981; } 
        .concursos-tag { color: #3b82f6; }

        .card-content h2 { font-size: 1.3rem; margin-bottom: 10px; line-height: 1.3; color: var(--text-main); }
        .card-content p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.6; }

        .btn-voltar { color: var(--primary); text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; transition: 0.2s; }
        .btn-voltar:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-menu">
        <div class="nav-links-group">
            <a href="index.html" class="nav-link">🏠 Início</a>
            <a href="simulados.html" class="nav-link">📝 Simulados</a>
            <a href="dicas-desenvolvimento.html" class="nav-link">💡 Dicas & Dev</a>
        </div>
        <a href="admin.html" class="btn-post" id="btnAdmin">+ Novo Post</a>
    </nav>

    <a href="#" class="btn-voltar" onclick="window.history.back(); return false;">← Voltar para a página anterior</a>
    
    <header>
        <h1>Notícias & Editais</h1>
        <p>Fique por dentro de tudo o que acontece nos concursos do Maranhão.</p>
    </header>

    <div class="filtros-blog">
        <button class="btn-categoria active" onclick="filtrar('todos')">📚 Tudo</button>
        <button class="btn-categoria" onclick="filtrar('concursos')">🏛️ Concursos</button>
        <button class="btn-categoria" onclick="filtrar('enem')">🎓 ENEM</button>
        <button class="btn-categoria" onclick="filtrar('uema')">🏹 UEMA</button>
    </div>

    <div id="blog-lista" class="blog-grid">
        <p style="text-align: center; grid-column: 1/-1;">Carregando notícias do Maranhão...</p>
    </div>
</div>

<script>
    // 1. Configurações e Cache
    let artigosCache = [];

    // 2. Carregamento Principal (Supabase)
    async function carregarNoticias() {
        const grid = document.getElementById('blog-lista');
        
        try {
            const { data, error } = await supabase
                .from('artigos')
                .select('*')
                .in('categoria', ['concursos', 'enem', 'uema'])
                .order('created_at', { ascending: false });

            if (error) throw error;

            artigosCache = data;
            renderizar(artigosCache);

        } catch (err) {
            console.error("Erro Supabase:", err);
            grid.innerHTML = `<p style="color: #ef4444; text-align: center; grid-column: 1/-1;">Erro ao carregar dados. Verifique a conexão com o banco.</p>`;
        }
    }

    // 3. Renderização dos Cards
    function renderizar(lista) {
        const grid = document.getElementById('blog-lista');
        
        if (lista.length === 0) {
            grid.innerHTML = `<p style="text-align: center; grid-column: 1/-1;">Nenhum post encontrado para esta categoria.</p>`;
            return;
        }

        grid.innerHTML = lista.map(post => {
            const cat = post.categoria.toLowerCase();
            const tagClasse = `${cat}-tag`;
            
            return `
                <a href="post.html?slug=${post.slug}" class="blog-card">
                    <img src="${post.capa_url || 'https://via.placeholder.com/400x200'}" 
                         class="card-img" 
                         alt="${post.titulo}"
                         onerror="this.src='https://via.placeholder.com/400x200'">
                    <div class="card-content">
                        <span class="category ${tagClasse}">${post.categoria}</span>
                        <h2>${post.titulo}</h2>
                        <p>${post.resumo}</p>
                    </div>
                </a>
            `;
        }).join('');
    }

    // 4. Sistema de Filtro
    function filtrar(cat) {
        // Estilo dos botões
        document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        if (cat === 'todos') {
            renderizar(artigosCache);
        } else {
            const filtrados = artigosCache.filter(a => a.categoria.toLowerCase() === cat);
            renderizar(filtrados);
        }
    }

    // 5. Inicialização e Segurança de Admin
    document.addEventListener("DOMContentLoaded", () => {
        // Verifica admin
        const isAdmin = localStorage.getItem('token_admin'); 
        if (isAdmin !== 'sou_o_dono_do_site') {
            document.getElementById('btnAdmin')?.remove();
        }

        // Carrega os dados
        carregarNoticias();
    });
</script>

</body>
</html>
