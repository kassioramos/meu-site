<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Concursos Maranhão Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        header p { color: var(--text-sub); }

        /* Grid de Artigos */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .blog-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
        }

        .card-content { padding: 20px; flex-grow: 1; }
        .category { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: var(--primary); 
            font-weight: 700;
            letter-spacing: 1px;
        }
        .card-content h2 { font-size: 1.3rem; margin: 10px 0; line-height: 1.3; }
        .card-content p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.6; }

        .btn-voltar { color: var(--primary); text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-voltar">← Voltar para o início</a>
    
    <header>
        <h1>Dicas & Notícias</h1>
        <p>Aprenda técnicas de estudo e fique por dentro dos editais do Maranhão.</p>
    </header>

    <div id="blog-lista" class="blog-grid">
        <p>Carregando artigos...</p>
    </div>
</div>

<script>
    async function carregarBlog() {
        const grid = document.getElementById('blog-lista');
        try {
            // AJUSTE A URL PARA A SUA API DO RENDER
            const response = await fetch('https://meu-site-aodm.onrender.com/artigos');
            const artigos = await response.json();

            if (artigos.length === 0) {
                grid.innerHTML = "<p>Nenhum artigo publicado ainda.</p>";
                return;
            }

            grid.innerHTML = artigos.map(post => `
                <a href="post.html?slug=${post.slug}" class="blog-card">
                    <img src="${post.capa_url || 'https://via.placeholder.com/400x200'}" class="card-img" alt="${post.titulo}">
                    <div class="card-content">
                        <span class="category">${post.categoria}</span>
                        <h2>${post.titulo}</h2>
                        <p>${post.resumo}</p>
                    </div>
                </a>
            `).join('');

        } catch (error) {
            grid.innerHTML = "<p>Erro ao carregar o blog. Tente novamente mais tarde.</p>";
            console.error(error);
        }
    }

    window.onload = carregarBlog;
</script>

</body>
</html>
