<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Concursos Maranhão Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; position: relative; }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        header p { color: var(--text-sub); }

        /* Filtros */
        .filtros-blog { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .btn-categoria { 
            background: var(--card-bg); border: 1px solid var(--border); 
            color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; 
        }
        .btn-categoria.active { background: var(--primary); border-color: var(--primary); }

        /* Botão Novo Post */
        .btn-post {
            background: #10b981; color: white; padding: 10px 20px; 
            border-radius: 8px; text-decoration: none; font-weight: bold;
        }

        /* Grid de Artigos */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .blog-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .card-content { padding: 20px; flex-grow: 1; }
        
        /* Cores das Tags */
        .category { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .uema-tag { color: #f97316; } /* Laranja */
        .enem-tag { color: #10b981; } /* Verde */
        .concursos-tag { color: #3b82f6; } /* Azul */

        .card-content h2 { font-size: 1.3rem; margin: 10px 0; line-height: 1.3; }
        .card-content p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.6; }

        .btn-voltar { color: var(--primary); text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div style="position: absolute; top: 0; right: 0;">
        <a href="/post" class="btn-post">+ Novo Post</a>
    </div>

    <a href="index.html" class="btn-voltar">← Voltar para o início</a>
    
    <header>
        <h1>Dicas & Notícias</h1>
        <p>Aprenda técnicas de estudo e fique por dentro dos editais do Maranhão.</p>
    </header>

    <div class="filtros-blog">
        <button class="btn-categoria active" onclick="filtrar('todos')">📚 Tudo</button>
        <button class="btn-categoria" onclick="filtrar('concursos')">🏛️ Concursos</button>
        <button class="btn-categoria" onclick="filtrar('enem')">🎓 ENEM</button>
        <button class="btn-categoria" onclick="filtrar('uema')">🏹 UEMA</button>
    </div>

    <div id="blog-lista" class="blog-grid">
        <p>Carregando artigos...</p>
    </div>
</div>

<script>
    let artigosCache = [];

    async function carregarBlog() {
        const grid = document.getElementById('blog-lista');
        try {
            const response = await fetch('https://meu-site-aodm.onrender.com/artigos');
            artigosCache = await response.json();
            renderizarArtigos(artigosCache);
        } catch (error) {
            grid.innerHTML = "<p>Erro ao carregar o blog.</p>";
            console.error(error);
        }
    }

    function renderizarArtigos(artigos) {
        const grid = document.getElementById('blog-lista');
        if (artigos.length === 0) {
            grid.innerHTML = "<p>Nenhum artigo encontrado.</p>";
            return;
        }

        grid.innerHTML = artigos.map(post => {
            // Define a classe de cor baseada na categoria
            const categoriaClasse = post.categoria ? post.categoria.toLowerCase() + "-tag" : "";
            
            return `
                <a href="post.html?slug=${post.slug}" class="blog-card">
                    <img src="${post.capa_url || 'https://via.placeholder.com/400x200'}" class="card-img" alt="${post.titulo}">
                    <div class="card-content">
                        <span class="category ${categoriaClasse}">${post.categoria || 'Geral'}</span>
                        <h2>${post.titulo}</h2>
                        <p>${post.resumo}</p>
                    </div>
                </a>
            `;
        }).join('');
    }

    function filtrar(categoria) {
        // Atualiza botões ativos
        document.querySelectorAll('.btn-categoria').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if (categoria === 'todos') {
            renderizarArtigos(artigosCache);
        } else {
            const filtrados = artigosCache.filter(a => a.categoria.toLowerCase() === categoria);
            renderizarArtigos(filtrados);
        }
    }

    window.onload = carregarBlog;
</script>

</body>
</html>
