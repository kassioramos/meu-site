<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Concursos Maranhão Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --accent: #10b981; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        /* Nav simplificada */
        .nav-menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-sub);
            font-weight: 600;
            padding: 8px 16px;
            transition: 0.3s;
        }
        .nav-link:hover { color: var(--primary); }

        header { text-align: center; margin: 40px 0; }
        header h1 { color: var(--primary); font-size: 2.5rem; }

        /* Filtros */
        .filtros-blog { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }
        .btn-categoria { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-categoria.active { background: var(--primary); border-color: var(--primary); }

        /* Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .blog-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .blog-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #000; }
        .card-content { padding: 20px; }
        
        .category-tag { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            font-weight: bold; 
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
        }

        .card-content h2 { font-size: 1.2rem; margin-bottom: 10px; }
        .card-content p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-menu">
        <a href="index.html" class="nav-link">🏠 Início</a>
        <a href="admin.html" id="btnAdmin" style="color: var(--accent); text-decoration: none; font-weight: bold;">+ Novo Post</a>
    </nav>

    <header>
        <h1 id="titulo-pagina">Notícias & Dicas</h1>
        <p>Tudo o que você precisa para vencer nos concursos.</p>
    </header>

    <div class="filtros-blog">
        <button class="btn-categoria active" onclick="filtrar('todos')">📚 Tudo</button>
        <button class="btn-categoria" onclick="filtrar('Notícias')">📰 Notícias</button>
        <button class="btn-categoria" onclick="filtrar('Dicas')">💡 Dicas</button>
        <button class="btn-categoria" onclick="filtrar('Desenvolvimento')">💻 Dev</button>
        <button class="btn-categoria" onclick="filtrar('UEMA')">🏹 UEMA</button>
        <button class="btn-categoria" onclick="filtrar('ENEM')">🎓 ENEM</button>
    </div>

    <div id="blog-lista" class="blog-grid">
        <p style="text-align: center; grid-column: 1/-1;">Carregando conteúdo...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let artigosCache = [];

    async function carregarBlog() {
        const urlParams = new URLSearchParams(window.location.search);
        const catInicial = urlParams.get('cat'); 

        try {
            // Busca TUDO uma vez só para o cache
            const { data, error } = await _supabase
                .from('artigos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            artigosCache = data || [];

            // Se veio com categoria na URL, filtra logo de cara
            if (catInicial) {
                filtrar(catInicial);
            } else {
                renderizar(artigosCache);
            }

        } catch (err) {
            console.error(err);
            document.getElementById('blog-lista').innerHTML = "Erro ao carregar.";
        }
    }

    function renderizar(lista) {
        const grid = document.getElementById('blog-lista');
        
        if (lista.length === 0) {
            grid.innerHTML = `<p style="text-align: center; grid-column: 1/-1;">Nenhum post encontrado nesta categoria.</p>`;
            return;
        }

grid.innerHTML = lista.map(post => `
    <a href="post.html?slug=${post.slug}" class="blog-card">
        <img src="${post.capa_url || 'https://via.placeholder.com/400x200'}" class="card-img">
        <div class="card-content">
            <span class="category-tag">${post.categoria}</span>
            <h2>${post.titulo}</h2>
            <p>${post.resumo || ''}</p>
        </div>
    </a>
`).join('');
    }

    function filtrar(cat) {
        // Estilo visual dos botões
        document.querySelectorAll('.btn-categoria').forEach(b => {
            b.classList.remove('active');
            if(b.innerText.includes(cat) || (cat === 'todos' && b.innerText.includes('Tudo'))) {
                b.classList.add('active');
            }
        });

        if (cat === 'todos') {
            renderizar(artigosCache);
            document.getElementById('titulo-pagina').innerText = "Notícias & Dicas";
        } else {
            // Filtro inteligente (não diferencia maiúsculas/minúsculas)
            const filtrados = artigosCache.filter(a => 
                a.categoria.toLowerCase().includes(cat.toLowerCase())
            );
            renderizar(filtrados);
            document.getElementById('titulo-pagina').innerText = `Categoria: ${cat}`;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        // Verifica admin
        if (localStorage.getItem('token_admin') !== 'sou_o_dono_do_site') {
            document.getElementById('btnAdmin')?.remove();
        }
        carregarBlog();
    });
</script>

</body>
</html>
