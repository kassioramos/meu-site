<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Questões - Concursos MA Pro</title>
<style>
    body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
    .questao-card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
    .enunciado { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
    .disciplina { color: #38bdf8; font-size: 0.9em; margin-bottom: 10px; font-weight: bold; }
    
    .alternativas-lista { list-style: none; padding: 0; }
    
    .alternativa-btn { 
        width: 100%; 
        text-align: left; 
        background: #334155; 
        color: white; 
        border: 2px solid transparent; 
        padding: 12px; 
        margin: 8px 0; 
        border-radius: 8px; 
        cursor: pointer; 
        transition: 0.2s;
        font-size: 1em;
    }

    .alternativa-btn:hover:not(:disabled) { background: #475569; border-color: #38bdf8; }

    /* Cores de Feedback */
    .correta { background: #065f46 !important; border-color: #10b981 !important; }
    .errada { background: #7f1d1d !important; border-color: #ef4444 !important; }

    /* NOVA CAIXA DE COMENTÁRIO */
    .feedback { 
        margin-top: 15px; 
        padding: 15px; 
        border-radius: 8px; 
        display: none; 
        background: #1e293b;
        border: 1px solid #38bdf8;
        line-height: 1.5;
    }
    .comentario-texto {
        margin-top: 10px;
        color: #cbd5e1;
        font-weight: normal;
        font-size: 0.95em;
        border-top: 1px solid #334155;
        padding-top: 10px;
    }
</style>
</head>
<body>

    <a href="javascript:history.back()" style="color: #38bdf8; text-decoration: none;">← Voltar</a>
    <h2 id="titulo-banca">Carregando...</h2>
    <div id="lista-questoes">Buscando questões no banco de dados...</div>

<script>
    async function carregarQuestoes() {
        const params = new URLSearchParams(window.location.search);
        const banca = params.get('banca') || "Instituto JK";
        const container = document.getElementById('lista-questoes');
        document.getElementById('titulo-banca').innerText = `Questões: ${banca}`;

        const URL_API = `https://meu-site-aodm.onrender.com/questoes?banca=${encodeURIComponent(banca)}`;

        try {
            const response = await fetch(URL_API);
            const data = await response.json();

            if (!data || data.length === 0) {
                container.innerHTML = "<h3>Nenhuma questão encontrada.</h3>";
                return;
            }

            container.innerHTML = data.map((q, index) => {
                const opcoes = q.opcoes || {};
                const botoes = Object.keys(opcoes).map(letra => `
                    <button class="alternativa-btn" 
                            onclick="verificarResposta(this, '${letra}', '${q.alternativa_correta}', 'feedback-${index}')">
                        ${letra.toUpperCase()}) ${opcoes[letra]}
                    </button>
                `).join('');

                return `
                <div class="questao-card">
                    <div class="disciplina">📚 ${q.disciplina || 'Geral'}</div>
                    <p class="enunciado">${q.enunciado}</p>
                    <div class="alternativas-lista">${botoes}</div>
                    
                    <div id="feedback-${index}" class="feedback">
                        <div id="status-${index}"></div>
                        <div class="comentario-texto">
                            <strong>Comentário do Professor:</strong><br>
                            ${q.comentario_professor || "Sem comentário disponível para esta questão."}
                        </div>
                    </div>
                </div>`;
            }).join('');

        } catch (error) {
            container.innerHTML = "<p>Erro ao carregar questões.</p>";
        }
    }

    function verificarResposta(botao, letraEscolhida, letraCorreta, feedbackId) {
        const feedbackDiv = document.getElementById(feedbackId);
        const index = feedbackId.split('-')[1];
        const statusDiv = document.getElementById(`status-${index}`);
        
        const card = botao.parentElement.parentElement; // Sobe para o card
        const todosBotoes = card.querySelectorAll('.alternativa-btn');

        todosBotoes.forEach(btn => btn.disabled = true);

        feedbackDiv.style.display = "block";

        if (letraEscolhida.toLowerCase() === letraCorreta.toLowerCase()) {
            botao.classList.add('correta');
            statusDiv.innerHTML = "<span style='color: #10b981'>✅ Resposta Correta!</span>";
        } else {
            botao.classList.add('errada');
            statusDiv.innerHTML = `<span style='color: #ef4444'>❌ Resposta Errada. A correta é a letra ${letraCorreta.toUpperCase()}.</span>`;
            
            todosBotoes.forEach(btn => {
                if (btn.innerText.trim().startsWith(letraCorreta.toUpperCase() + ")")) {
                    btn.classList.add('correta');
                }
            });
        }
    }

    window.onload = carregarQuestoes;
</script>
</body>
</html>
