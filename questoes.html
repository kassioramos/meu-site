<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões e Simulados | Concursos Maranhão Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { margin: 0; background-color: #0f172a; color: white; }
        header { padding: 30px; text-align: center; background: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* Estilo dos Filtros */
        .filter-section { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .btn-cat { padding: 10px 20px; border-radius: 8px; border: 1px solid #3b82f6; background: transparent; color: white; cursor: pointer; transition: 0.3s; text-decoration: none; font-size: 0.9rem; }
        .btn-cat:hover, .btn-cat.active { background: #3b82f6; }
        .btn-redacao { border-color: #ef4444; color: #ef4444; }
        .btn-redacao:hover { background: #ef4444; color: white; }
        .btn-obras { border-color: #fbbf24; color: #fbbf24; }
        .btn-obras:hover { background: #fbbf24; color: #000; }

        #lista-questoes { display: grid; gap: 20px; }
        .questao-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; background: #3b82f6; margin-right: 5px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">← Voltar ao Início</a>
    <h1>Banco de Questões</h1>
    <p>Simulados, Redações e Análises de Obras</p>
</header>

<div class="container">
    <div class="filter-section">
        <button class="btn-cat active" onclick="filtrarQuestoes('todos')">Tudo</button>
        <button class="btn-cat" onclick="filtrarQuestoes('ENEM')">🎓 ENEM</button>
        <button class="btn-cat" onclick="filtrarQuestoes('UEMA')">🏹 UEMA</button>
        
        <select id="selectBanca" class="btn-cat" onchange="filtrarQuestoes(this.value)" style="background: #0f172a;">
            <option value="todos">Concursos por banca</option>
            <option value="FGV">FGV</option>
            <option value="CESPE">Cebraspe</option>
            <option value="FCC">FCC</option>
            <option value="Instituto JK">Instituto JK</option>
        </select>

        <button class="btn-cat btn-redacao" onclick="filtrarQuestoes('Redação')">✍️ Redação</button>
        <button class="btn-cat btn-obras" onclick="filtrarQuestoes('Obras UEMA')">📚 Obras UEMA</button>
    </div>

    <div id="lista-questoes">
        </div>
</div>

<script>
    const URL_SB = 'https://mczmhvuxujvhrudqmpvg.supabase.co';
    const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jem1odnV4dWp2aHJ1ZHFtcHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzgwMDksImV4cCI6MjA5MTUxNDAwOX0.vqNvzVRzpH9Otqb7DISpWXLw4b6eegdwzpaLBRJPwfY';
    const _sb = supabase.createClient(URL_SB, KEY_SB);

    let baseQuestoes = [];

    async function carregarQuestoes() {
        const { data, error } = await _sb.from('questoes').select('*');
        if (error) {
            document.getElementById('lista-questoes').innerHTML = "Erro ao carregar banco de dados.";
            return;
        }
        baseQuestoes = data;
        renderizar(data);
    }

    function renderizar(lista) {
        const container = document.getElementById('lista-questoes');
        if(lista.length === 0) {
            container.innerHTML = "<p style='text-align:center'>Nenhum conteúdo encontrado nesta categoria.</p>";
            return;
        }

        container.innerHTML = lista.map(q => `
            <div class="questao-card">
                <div>
                    <span class="tag">${q.categoria || 'Geral'}</span>
                    <span class="tag" style="background:#10b981">${q.banca || 'Simulado'}</span>
                </div>
                <h3 style="margin: 15px 0; font-size: 1.1rem;">${q.titulo}</h3>
                <p style="color: #94a3b8; font-size: 0.9rem;">${q.descricao || 'Clique abaixo para acessar o conteúdo completo.'}</p>
                <a href="detalhes.html?id=${q.id}&tipo=questao" style="color: #60a5fa; text-decoration: none; font-weight: bold; font-size: 0.9rem;">ACESSAR MATERIAL →</a>
            </div>
        `).join('');
    }

    function filtrarQuestoes(termo) {
        // Remove 'active' de todos e coloca no clicado
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        
        if (termo === 'todos') {
            renderizar(baseQuestoes);
        } else {
            const filtradas = baseQuestoes.filter(q => 
                (q.categoria && q.categoria.includes(termo)) || 
                (q.banca && q.banca.includes(termo)) ||
                (q.titulo && q.titulo.includes(termo))
            );
            renderizar(filtradas);
        }
    }

    carregarQuestoes();
</script>
</body>
</html>
